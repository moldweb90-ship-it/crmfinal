name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lifedental-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload, build and restart CRM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: ${{ secrets.VPS_APP_DIR || '/var/www/lifedental-crm' }}
          rm: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/var/www/lifedental-crm"
            fi

            cd "$APP_DIR"
            if [ -z "${{ secrets.DATABASE_URL }}" ]; then
              echo "DATABASE_URL secret is required for server database mode"
              exit 1
            fi

            printf '%s\n' \
              'NEXT_PUBLIC_DB_MODE=server' \
              'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
              > .env.production

            npm ci
            npm run build
            pm2 restart lifedental-crm || pm2 start npm --name lifedental-crm -- start -- -p 3000
            pm2 save
